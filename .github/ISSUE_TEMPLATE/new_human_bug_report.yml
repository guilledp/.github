name: Human bug report
description: Bug report creado manualmente por una persona.
title: "[BUG] "
labels:
  - bug
assignees:
  - guilledp

body:
  - type: markdown
    attributes:
      value: |
        🪲 Bug Report
        🤖 Bienvenido Humano!
        Este formulario permite registrar errores detectados durante el uso del sistema.
        Antes de enviarlo, describí claramente qué ocurrió, qué esperabas que ocurriera y cualquier información que pueda ayudar a reproducir el problema.
        Una descripción precisa reduce el tiempo necesario para analizar, reproducir y resolver el bug.

  - type: dropdown
    id: bug_type
    attributes:
      label: Tipo de bug
      options:
        - Flujo/enlaces/experiencia
        - Visual/estilo/interfaz
        - Rendimiento/velocidad/demora
        - Congelamiento/bloqueo/cierre
        - Datos/almacenamiento/base
        - Seguridad/acceso/permisos
        - Otro/misceláneo/desconocido
    validations:
      required: true

  - type: input
    id: detected_behavior
    attributes:
      label: Comportamiento detectado
      description: Describí qué sucede actualmente.
    validations:
      required: true

  - type: input
    id: expected_behavior
    attributes:
      label: Comportamiento esperado
      description: Describí qué debería suceder.
    validations:
      required: true

  - type: textarea
    id: additional_information
    attributes:
      label: Información adicional
      description: Agregá capturas, mensajes de error, registros u otros datos relevantes.
    validations:
      required: false
