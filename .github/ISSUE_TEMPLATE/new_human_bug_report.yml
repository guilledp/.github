name: Human bug report
description: Bug report creado manualmente por una persona.
title: "[BUG] "
labels:
  - bug
assignees:
  - guilledp

body:
  - type: markdown
    attributes:
      value: |
        ## 🪲 Bug report
        ## 🤖👋 Bienvenido humano !! Este formulario permite registrar errores detectados durante el uso del sistema. 
        
        ### A tener en cuenta: 
        
        * Este formulario solo permite cargar errores (bugs) 
        * Features, Questions e Ideas se cargan en otros formularios.
        * Ser criterioso al momento de seleccionar la prioridad.
        
        **Gracias!**
        `Bip bop @ 6C 65 6F 20 6D 65 73 73 69`
        
  - type: dropdown
    id: bug_type
    attributes:
      label: Tipo de bug
      description: Seleccioná la categoría que mejor represente el problema.
      options:
        - Flujo, enlaces o experiencia de usuario
        - Visual, estilo o interfaz
        - Rendimiento, velocidad o demora
        - Congelamiento, bloqueo o cierre
        - Datos, almacenamiento o base de datos
        - Seguridad, acceso o permisos
        - Otro, misceláneo o desconocido
    validations:
      required: true

  - type: input
    id: detected_behavior
    attributes:
      label: Comportamiento detectado
      description: Describí brevemente qué sucede actualmente.
      placeholder: "Ejemplo: al guardar el formulario, la pantalla permanece cargando indefinidamente."
    validations:
      required: true

  - type: input
    id: expected_behavior
    attributes:
      label: Comportamiento esperado
      description: Describí brevemente qué debería suceder.
      placeholder: "Ejemplo: el formulario debería guardarse y mostrar una confirmación."
    validations:
      required: true

  - type: textarea
    id: additional_information
    attributes:
      label: Información adicional
      description: Agregá capturas, mensajes de error, registros, pasos para reproducir el problema u otros datos relevantes.
      placeholder: |
        Podés incluir:

        - Pasos para reproducir el problema
        - Capturas o grabaciones
        - Mensajes de error
        - Registros relevantes
        - Navegador, dispositivo o entorno
    validations:
      required: false
