name: Human bug report
description: Bug report creado manualmente por una persona.
title: "[BUG] "
labels:
  - bug
assignees:
  - guilledp

body:
  - type: markdown
    attributes:
      value: |
        # ¡Bienvenido, humano!

        Completá los siguientes campos con información clara y concisa.

  - type: dropdown
    id: bug_type
    attributes:
      label: Tipo de bug
      options:
        - Funcional
        - Visual
        - Rendimiento
        - Datos
        - Seguridad
        - Otro
    validations:
      required: true

  - type: input
    id: detected_behavior
    attributes:
      label: Comportamiento detectado
      description: Describí qué sucede actualmente.
    validations:
      required: true

  - type: input
    id: expected_behavior
    attributes:
      label: Comportamiento esperado
      description: Describí qué debería suceder.
    validations:
      required: true

  - type: textarea
    id: additional_information
    attributes:
      label: Información adicional
      description: Agregá capturas, mensajes de error, registros u otros datos relevantes.
    validations:
      required: false
