name: Human bug report
description: Bug report creado manualmente por una persona.
title: "[BUG] "
labels:
  - bug
assignees:
  - guilledp

body:
  - type: textarea
    id: detected_behavior
    attributes:
      label: Comportamiento detectado
      description: Describí qué sucede actualmente, cuándo ocurre y, opcionalmente, los pasos necesarios para reproducirlo.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Comportamiento esperado
      description: Describí qué debería suceder en su lugar y cuál sería el resultado correcto.
    validations:
      required: true

  - type: textarea
    id: additional_information
    attributes:
      label: Información adicional
      description: Agregá capturas, mensajes de error, registros u otros datos relevantes.
    validations:
      required: false
